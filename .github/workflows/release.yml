name: release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write # npm provenance

concurrency: release-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      # No `registry-url` here: it would point npm's userconfig at a file
      # that reads the unset NODE_AUTH_TOKEN, superseding the ~/.npmrc the
      # changesets action writes from NPM_TOKEN and breaking authentication.
      # Node 24 (the engines floor; >= 24.5.0) bundles npm >= 11.5.1, which
      # trusted publishing (OIDC via the id-token permission above) requires.
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      # Validate the tarball in this job, not just in the concurrent CI
      # workflow, so a publish can never race ahead of the check.
      - run: pnpm run check-pack
      # Opens/updates a "Version Packages" PR when changesets are pending;
      # publishes to npm once that PR merges. Publishing authenticates via
      # npm trusted publishing — no NPM_TOKEN secret — and provenance is
      # generated automatically. One-time bootstrap: the package must exist
      # on npm before a trusted publisher can be configured, so the FIRST
      # release is published manually (see CONTRIBUTING.md).
      - uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          title: "chore: Version Packages"
          commit: "chore: Version Packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
